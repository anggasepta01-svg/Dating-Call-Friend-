name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies & Buildozer
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache git libffi-dev libssl-dev python3-dev
          pip install --upgrade "cython<3.0.0" buildozer

      - name: Build APK with Buildozer Action
        uses: ArtemSundaev/buildozer-action@v1.2
        with:
          command: buildozer -v android debug
          repository_root: .

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: DatingCallApp-APK
          path: bin/*.apk
          
