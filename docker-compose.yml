version: '3.8'\n\nservices:\n  # MongoDB Database\n  mongodb:\n    image: mongo:latest\n    container_name: dating_mongodb\n    environment:\n      MONGO_INITDB_ROOT_USERNAME: admin\n      MONGO_INITDB_ROOT_PASSWORD: password123\n    ports:\n      - \"27017:27017\"\n    volumes:\n      - mongodb_data:/data/db\n    networks:\n      - dating_network\n\n  # Redis Cache\n  redis:\n    image: redis:latest\n    container_name: dating_redis\n    ports:\n      - \"6379:6379\"\n    networks:\n      - dating_network\n\n  # Node.js Backend\n  backend:\n    build:\n      context: ./backend\n      dockerfile: Dockerfile\n    container_name: dating_backend\n    environment:\n      NODE_ENV: development\n      MONGODB_URI: mongodb://admin:password123@mongodb:27017/dating_app?authSource=admin\n      REDIS_URL: redis://redis:6379\n      JWT_SECRET: your_jwt_secret_key_here\n      STRIPE_SECRET_KEY: sk_test_your_stripe_key\n      STRIPE_PUBLISHABLE_KEY: pk_test_your_stripe_key\n      FRONTEND_URL: http://localhost:3000\n      PORT: 5000\n    ports:\n      - \"5000:5000\"\n    depends_on:\n      - mongodb\n      - redis\n    volumes:\n      - ./backend:/app\n      - /app/node_modules\n    networks:\n      - dating_network\n    command: npm start\n\n  # React Native/Expo Server (optional for development)\n  frontend:\n    image: node:18-alpine\n    container_name: dating_frontend\n    working_dir: /app\n    environment:\n      EXPO_PUBLIC_API_URL: http://localhost:5000\n    ports:\n      - \"3000:3000\"\n      - \"19000:19000\"\n      - \"19001:19001\"\n    volumes:\n      - ./frontend:/app\n      - /app/node_modules\n    networks:\n      - dating_network\n    command: npm start\n\nvolumes:\n  mongodb_data:\n\nnetworks:\n  dating_network:\n    driver: bridge\n